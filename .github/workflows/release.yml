name: Vault OPSEC Sterile Build Pipeline
 
on:
  push:
    branches: ["main"]
 
jobs:
  # ── Paso 1: Crear el Release UNA sola vez antes de que los builds corran ──
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.releaseId }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
 
      - name: Create or Get GitHub Release
        id: create_release
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            let rId;
            try {
              const res = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: 'v1.0.0-final'
              });
              rId = res.data.id;
            } catch (err) {
              if (err.status === 404) {
                const res = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: 'v1.0.0-final',
                  name: 'Vault 1.0.0 OPSEC Release',
                  body: 'These zero-trace binaries were compiled flawlessly through Microsoft\'s cloud array using Open Source mechanisms, ensuring complete local hardware decoupling (OPSEC Level 4). Android, Linux and Windows.',
                  draft: true,
                  prerelease: false
                });
                rId = res.data.id;
              } else {
                throw err;
              }
            }
            core.setOutput('releaseId', rId);
 
  # ── Paso 2: Builds en paralelo, suben al Release ya creado ──
  build-and-release:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux
 
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows
 
          - os: ubuntu-22.04
            target: aarch64-linux-android
            name: Android
 
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
 
      - name: Setup Node.js Space
        uses: actions/setup-node@v4
        with:
          node-version: 20
 
      # ── Dependencias Linux ──
      - name: Install System UI Dependencies (Linux Only)
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            rpm \
            libfuse2 \
            file
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> $GITHUB_ENV
 
      # ── Dependencias Android ──
      - name: Install System Dependencies (Android Only)
        if: matrix.name == 'Android'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev
 
      - name: Install Java 17 (Android Only)
        if: matrix.name == 'Android'
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
 
      - name: Setup Android SDK (Android Only)
        if: matrix.name == 'Android'
        uses: android-actions/setup-android@v3
 
      - name: Install NDK (Android Only)
        if: matrix.name == 'Android'
        run: sdkmanager "ndk;25.2.9519653"
 
      - name: Add Android Rust Targets
        if: matrix.name == 'Android'
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
 
      # ── Rust ──
      - name: Install Rust Security Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
 
      # ── Frontend ──
      - name: Build Web Frontend Cache
        working-directory: ./app
        run: npm install
 
      # ── Binarios IPFS por plataforma ──
      - name: Download IPFS Sidecar Binaries (Linux)
        if: matrix.name == 'Linux'
        shell: bash
        run: |
          mkdir -p app/src-tauri/binaries
          cd app/src-tauri/binaries
          curl -sL -o ipfs.tar.gz https://dist.ipfs.tech/kubo/v0.27.0/kubo_v0.27.0_linux-amd64.tar.gz
          tar -xzf ipfs.tar.gz
          mv kubo/ipfs ipfs-x86_64-unknown-linux-gnu
          rm -rf kubo ipfs.tar.gz
 
      - name: Download IPFS Sidecar Binaries (Windows)
        if: matrix.name == 'Windows'
        shell: bash
        run: |
          mkdir -p app/src-tauri/binaries
          cd app/src-tauri/binaries
          curl -sL -o ipfs.zip https://dist.ipfs.tech/kubo/v0.27.0/kubo_v0.27.0_windows-amd64.zip
          unzip -q ipfs.zip
          mv kubo/ipfs.exe ipfs-x86_64-pc-windows-msvc.exe
          rm -rf kubo ipfs.zip
 
      - name: Download IPFS Sidecar Binaries (Android)
        if: matrix.name == 'Android'
        shell: bash
        run: |
          mkdir -p app/src-tauri/binaries
          cd app/src-tauri/binaries
          # ARM64
          curl -sL -o ipfs_arm64.tar.gz https://dist.ipfs.tech/kubo/v0.27.0/kubo_v0.27.0_linux-arm64.tar.gz
          tar -xzf ipfs_arm64.tar.gz
          mv kubo/ipfs ipfs-aarch64-linux-android
          cp ipfs-aarch64-linux-android ipfs-x86_64-linux-android
          rm -rf kubo ipfs_arm64.tar.gz
          # ARM
          curl -sL -o ipfs_arm.tar.gz https://dist.ipfs.tech/kubo/v0.27.0/kubo_v0.27.0_linux-arm.tar.gz
          tar -xzf ipfs_arm.tar.gz
          mv kubo/ipfs ipfs-armv7-linux-androideabi
          cp ipfs-armv7-linux-androideabi ipfs-i686-linux-android
          rm -rf kubo ipfs_arm.tar.gz
 
      # ── tauri.conf.json por plataforma (sobrescribir targets) ──
      - name: Set bundle targets for Linux
        if: matrix.name == 'Linux'
        shell: bash
        run: |
          cd app/src-tauri
          node -e "
            const fs = require('fs');
            const c = JSON.parse(fs.readFileSync('tauri.conf.json'));
            c.bundle.targets = ['deb', 'rpm'];
            fs.writeFileSync('tauri.conf.json', JSON.stringify(c, null, 2));
          "
 
      - name: Set bundle targets for Windows
        if: matrix.name == 'Windows'
        shell: bash
        run: |
          cd app/src-tauri
          node -e "
            const fs = require('fs');
            const c = JSON.parse(fs.readFileSync('tauri.conf.json'));
            c.bundle.targets = ['nsis', 'msi'];
            fs.writeFileSync('tauri.conf.json', JSON.stringify(c, null, 2));
          "
 
      # ── Build Desktop (Linux + Windows) ──
      - name: Forge Tauri Sterile Binaries (Desktop)
        if: matrix.name != 'Android'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "1"
        with:
          projectPath: "app"
          args: ""
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: false
 
      # ── Build Android ──
      - name: Forge Tauri Sterile Binaries (Android)
        if: matrix.name == 'Android'
        working-directory: ./app
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: |
          rm -rf src-tauri/gen/android
          npm run tauri android init
          npm run tauri android build -- --apk
 
      - name: Upload Android APK to Release
        if: matrix.name == 'Android'
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
 
            const globber = await glob.create('app/src-tauri/gen/android/app/build/outputs/apk/**/*.apk');
            const apkFiles = await globber.glob();
            for (const apkPath of apkFiles) {
              const name = path.basename(apkPath);
              const data = fs.readFileSync(apkPath);
              const assetName = `Vault-${name}`;
              try {
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: ${{ needs.create-release.outputs.release_id }},
                  name: assetName,
                  data: data,
                });
              } catch (error) {
                if (error.status === 422 && error.message.includes('already_exists')) {
                  const assetsConfig = await github.rest.repos.listReleaseAssets({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    release_id: ${{ needs.create-release.outputs.release_id }},
                  });
                  const existingAsset = assetsConfig.data.find(a => a.name === assetName);
                  if (existingAsset) {
                    await github.rest.repos.deleteReleaseAsset({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      asset_id: existingAsset.id,
                    });
                    await github.rest.repos.uploadReleaseAsset({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      release_id: ${{ needs.create-release.outputs.release_id }},
                      name: assetName,
                      data: data,
                    });
                  }
                } else {
                  throw error;
                }
              }
            }
 
  # ── Paso 3: Publicar el Release solo si todos los builds son exitosos ──
  publish-release:
    needs: [create-release, build-and-release]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish Release (Remove Draft)
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            })
