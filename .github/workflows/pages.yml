name: Deploy Vault Portal to Pages

on:
  push:
    branches: ["main"]

  # Permite accionarlo manualmente desde GitHub
  workflow_dispatch:

# Permisos necesarios para que el bot suba la página
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Portal Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # AQUI LE DECIMOS QUE SOLO SUBA LA CARPETA /PORTAL
          path: './portal'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
